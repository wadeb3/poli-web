name: Sync MPs from They Vote For You

# NOTE: The automatic weekly schedule is disabled for now — They Vote For You
# appears to block requests from GitHub Actions' shared IP ranges (confirmed
# via a 403 error even with a valid key and User-Agent header). The same
# script works fine run manually from a normal home/office internet
# connection (see scripts/sync_mps.py and the README for how).
#
# Manual trigger is left in place in case this gets revisited later (e.g. if
# running from a different host, or if TVFY changes their filtering).
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync script
        env:
          TVFY_API_KEY: ${{ secrets.TVFY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/sync_mps.py
