name: Sync MPs from They Vote For You

on:
  schedule:
    # Runs every Monday at 06:00 UTC (~4pm AEST / 5pm AEDT).
    # MP/Senator lists change rarely, so weekly is plenty.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Lets you trigger this manually from the GitHub Actions tab, any time,
    # without waiting for the weekly schedule — useful right after a
    # by-election or when testing.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync script
        env:
          TVFY_API_KEY: ${{ secrets.TVFY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/sync_mps.py
